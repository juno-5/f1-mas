# MAS Function Definitions — detect functions, map to personas, set domain defaults
# Loaded by mas_orchestrator.py (patterns) and mas_persona_index.py (priority)
#
# 형식:
#   function_name:
#     patterns: [regex 패턴 — 쿼리에서 이 기능 탐지]
#     priority: [persona ID 우선순위 — 첫 번째가 최우선]
#
# defaults: domain → fallback function (쿼리에서 function 미탐지 시)

# ─── Developers ───────────────────────────────────────────

system_architecture:
  patterns:
    - "아키텍처|architecture|시스템.{0,20}설계|서비스.{0,20}설계|인프라.{0,20}설계|design.{0,20}system|마이크로서비스|microservice"
  priority: ["F1-02", "FC-01", "F1-07"]

security_audit:
  patterns:
    - "보안|security|취약점|vulnerability|침투.{0,20}테스트|pentest|audit|사이버.{0,20}해킹|해킹.{0,20}(?:시도|공격|방어|탐지|차단)"
    # Cycle #13: 인증 프로토콜 키워드 추가 — F1-01/F1-06 (보안 전문) 라우팅
    - "\\bOAuth\\b|\\bJWT\\b|\\bSSO\\b|\\bSAML\\b|\\bMFA\\b|\\b2FA\\b|\\bOIDC\\b|인증.{0,4}(구현|설계|시스템|플로우|아키텍처)"
  priority: ["F1-01", "F1-06", "FC-06"]

performance:
  patterns:
    - "성능|성능.{0,20}최적화|코드.{0,20}최적화|쿼리.{0,20}최적화|속도.{0,20}최적화|벤치마크|benchmark|프로파일|profil|레이턴시|latency|(?:code|app|server|api|query|render|page|load).{0,20}performance|performance.{0,20}(?:optim|test|bench|tun|profil|issue|bottleneck|improv|monitor|degrad)"
  priority: ["F1-03", "FC-08"]

algorithm:

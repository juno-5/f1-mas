id: meta-ads-analysis
name: "Meta Ads Performance Analysis"
description: "Meta 광고 성과 데이터 조회 및 분석"
domain: marketing

triggers:
  - pattern: "(?:메타|Meta|페이스북|인스타).{0,8}(?:광고|ads).{0,8}(?:성과|분석|리포트|데이터|결과)"
    confidence: 0.9
  - pattern: "광고.{0,6}(?:성과|분석|리포트|현황)"
    confidence: 0.8
  - keywords: ["메타 광고 분석", "meta ads", "광고 성과 분석"]
    confidence: 1.0

config:
  model: haiku
  timeout: 90
  max_tokens: 4096
  fallback_to_pipeline: true

steps:
  - id: fetch_data
    type: nas_exec
    tag: macmini
    command: |
      source ~/.f1crew/credentials/.env && python3 -c "
      import requests, json, os, datetime
      token = os.environ.get('META_ACCESS_TOKEN', '')
      if not token:
          print(json.dumps({'error': 'META_ACCESS_TOKEN not set'}))
          exit()
      act_id = os.environ.get('META_AD_ACCOUNT_ID', '')
      today = datetime.date.today()
      since = (today - datetime.timedelta(days=7)).isoformat()
      until = today.isoformat()
      url = f'https://graph.facebook.com/v21.0/act_{act_id}/insights'
      params = {
          'access_token': token,
          'time_range': json.dumps({'since': since, 'until': until}),
          'fields': 'campaign_name,spend,impressions,clicks,ctr,cpc,cpm,actions,cost_per_action_type',
          'level': 'campaign',
          'limit': 20,
      }
      r = requests.get(url, params=params, timeout=30)
      print(r.text[:4000])
      "
    timeout: 45

  - id: analyze
    type: inference
    model: haiku
    max_tokens: 4096
    prompt: |
      Meta Ads 성과 데이터를 분석하여 마케팅 인사이트 리포트를 작성해주세요.

      ## Raw Data
      {steps.fetch_data.output}

      분석 항목:
      1. 캠페인별 핵심 KPI 요약 (Spend, CTR, CPC, CPM)
      2. Top/Bottom 캠페인 식별
      3. 전환 성과 분석 (actions 기반)
      4. 개선 제안 (1-2개)

      한국어로 작성, 마크다운 테이블 사용.

output:
  format: |
    ## Meta Ads 주간 성과 리포트

    {steps.analyze.output}

    ---
    _Routine: {routine.id} | {routine.duration_ms}ms_
